<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">Perfected Abstract Playful Puppy</title>
  <desc id="desc">A highly polished, abstract geometric puppy illustration featuring luscious gradients, flowing curves, and playful modern accents.</desc>

  <defs>
    <!-- Background Frame Pattern -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="3" fill="#D3C9B8" opacity="0.4" />
    </pattern>

    <!-- Drop Shadow for 2.5D Layering -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#3D261D" flood-opacity="0.12"/>
    </filter>
    
    <filter id="tagShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#2A9D8F" flood-opacity="0.2"/>
    </filter>

    <!-- Luscious Gradients -->
    <linearGradient id="furGradient" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#FFE3C2" />
      <stop offset="50%" stop-color="#DE9B65" />
      <stop offset="100%" stop-color="#B86B3E" />
    </linearGradient>

    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D18E5A" />
      <stop offset="100%" stop-color="#9E5931" />
    </linearGradient>

    <linearGradient id="earLeftGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B56A3E" />
      <stop offset="100%" stop-color="#6B371F" />
    </linearGradient>

    <linearGradient id="earRightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9E5931" />
      <stop offset="100%" stop-color="#4A2010" />
    </linearGradient>

    <radialGradient id="muzzleGradient" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="60%" stop-color="#FFEDD6" />
      <stop offset="100%" stop-color="#EAB282" />
    </radialGradient>

    <!-- Perfect Symmetry Head Clip -->
    <clipPath id="headClip">
      <path d="M 450 180 
               C 620 180, 720 280, 720 440 
               C 720 620, 580 720, 450 720 
               C 320 720, 180 620, 180 440 
               C 180 280, 280 180, 450 180 Z" />
    </clipPath>
  </defs>

  <!-- Background Canvas -->
  <rect width="900" height="900" fill="#F4F1EA" />
  
  <!-- Abstract Art Elements & Backdrop -->
  <g id="background-art">
    <path d="M 200 450 C 200 150, 400 100, 600 200 C 800 300, 850 600, 700 750 C 550 900, 200 750, 200 450 Z" fill="#EAE3D5" opacity="0.6" />
    
    <rect x="80" y="120" width="180" height="180" fill="url(#dots)" rx="30" />
    <rect x="680" y="600" width="140" height="140" fill="url(#dots)" rx="30" />

    <!-- Playful Floating Geometry -->
    <circle cx="200" cy="100" r="25" fill="#E9C46A" />
    <circle cx="240" cy="70" r="10" fill="#E76F51" />
    <path d="M 280 80 Q 310 50 340 80" fill="none" stroke="#2A9D8F" stroke-width="8" stroke-linecap="round" />

    <path d="M 120 200 C 150 150, 200 250, 250 200" fill="none" stroke="#F4A261" stroke-width="12" stroke-linecap="round" />
    
    <circle cx="750" cy="200" r="16" fill="#E76F51" />
    <circle cx="785" cy="155" r="9" fill="#2A9D8F" />
    <circle cx="820" cy="235" r="14" fill="#E9C46A" />

    <g transform="translate(140, 680)">
      <line x1="-16" y1="0" x2="16" y2="0" stroke="#2A9D8F" stroke-width="6" stroke-linecap="round" />
      <line x1="0" y1="-16" x2="0" y2="16" stroke="#2A9D8F" stroke-width="6" stroke-linecap="round" />
    </g>

    <g transform="translate(780, 720) rotate(45)">
      <line x1="-22" y1="0" x2="22" y2="0" stroke="#F4A261" stroke-width="8" stroke-linecap="round" />
      <line x1="0" y1="-22" x2="0" y2="22" stroke="#F4A261" stroke-width="8" stroke-linecap="round" />
    </g>

    <path d="M 730 350 A 60 60 0 0 1 800 420" fill="none" stroke="#2A9D8F" stroke-width="12" stroke-linecap="round" opacity="0.8" />
    <path d="M 110 500 A 40 40 0 0 0 160 550" fill="none" stroke="#E76F51" stroke-width="12" stroke-linecap="round" opacity="0.8" />

    <path d="M 120 350 A 40 40 0 0 1 200 350 Z" fill="#E9C46A" transform="rotate(-30 160 350)" />
  </g>

  <!-- Base Ground Shadow -->
  <ellipse cx="450" cy="875" rx="360" ry="22" fill="#D3C9B8" opacity="0.8" />

  <!-- Main Puppy Character -->
  <g id="puppy-character">
    
    <!-- Wagging Tail -->
    <path d="M 650 800 C 750 820, 850 780, 830 650 C 810 520, 750 680, 650 750 Z" fill="url(#bodyGradient)" filter="url(#softShadow)" />
    <!-- Tail Motion Lines -->
    <path d="M 850 640 A 30 30 0 0 1 860 690" fill="none" stroke="#F4A261" stroke-width="8" stroke-linecap="round" />
    <path d="M 870 650 A 40 40 0 0 1 880 710" fill="none" stroke="#F4A261" stroke-width="8" stroke-linecap="round" />

    <!-- Body -->
    <path d="M 300 650 C 200 700, 180 800, 200 900 L 700 900 C 720 800, 700 700, 600 650 Z" fill="url(#bodyGradient)" filter="url(#softShadow)" />

    <!-- Paws -->
    <g filter="url(#softShadow)">
      <ellipse cx="280" cy="840" rx="85" ry="50" fill="#B56A3E" />
      <circle cx="220" cy="845" r="12" fill="#E29864" />
      <circle cx="255" cy="820" r="15" fill="#E29864" />
      <circle cx="295" cy="815" r="16" fill="#E29864" />
      <circle cx="335" cy="830" r="14" fill="#E29864" />
    </g>

    <g filter="url(#softShadow)">
      <ellipse cx="620" cy="840" rx="85" ry="50" fill="#9E5931" />
      <circle cx="680" cy="845" r="12" fill="#E29864" />
      <circle cx="645" cy="820" r="15" fill="#E29864" />
      <circle cx="605" cy="815" r="16" fill="#E29864" />
      <circle cx="565" cy="830" r="14" fill="#E29864" />
    </g>

    <!-- Ears -->
    <path d="M 300 280 C 120 220, 40 380, 80 580 C 110 720, 250 780, 290 640 C 330 500, 300 280, 300 280 Z" fill="url(#earLeftGradient)" filter="url(#softShadow)" />
    <path d="M 600 280 C 780 220, 860 380, 820 580 C 790 720, 650 780, 610 640 C 570 500, 600 280, 600 280 Z" fill="url(#earRightGradient)" filter="url(#softShadow)" />

    <!-- Head Base -->
    <g filter="url(#softShadow)">
      <path d="M 450 180 C 620 180, 720 280, 720 440 C 720 620, 580 720, 450 720 C 320 720, 180 620, 180 440 C 180 280, 280 180, 450 180 Z" fill="url(#furGradient)" />
      
      <!-- Abstract Geometry / Markings Clipped to Head -->
      <g clip-path="url(#headClip)">
        <path d="M 380 180 C 380 320, 360 480, 450 480 C 540 480, 520 320, 520 180 Z" fill="#FFF4E0" opacity="0.9" />
        <path d="M 520 180 C 550 300, 420 500, 500 650 C 600 750, 800 600, 720 280 Z" fill="#C77C4E" opacity="0.85" />
        <circle cx="250" cy="550" r="140" fill="#DE9B65" opacity="0.6" />
        <circle cx="280" cy="250" r="60" fill="#E9C46A" opacity="0.7" />
        <path d="M 100 650 C 250 750, 650 750, 800 650 L 800 800 L 100 800 Z" fill="#FFF2DE" opacity="0.4" />
      </g>
    </g>

    <!-- Top Head Tufts -->
    <path d="M 425 185 Q 435 140 450 175 Q 465 130 475 185" fill="none" stroke="#B86B3E" stroke-width="12" stroke-linecap="round" />

    <!-- Stylish Geometric Collar -->
    <path d="M 320 670 Q 450 740 580 670 L 570 705 Q 450 770 330 705 Z" fill="#2A9D8F" filter="url(#softShadow)" />
    
    <!-- Collar Tag -->
    <polygon points="450,745 475,780 450,815 425,780" fill="#E9C46A" filter="url(#tagShadow)" />
    <circle cx="450" cy="762" r="5" fill="#EADFCE" />

    <!-- Muzzle -->
    <ellipse cx="450" cy="560" rx="170" ry="110" fill="url(#muzzleGradient)" filter="url(#softShadow)" />

    <!-- Cheek Blushes -->
    <circle cx="280" cy="490" r="35" fill="#F26D6D" opacity="0.25" />
    <circle cx="620" cy="490" r="35" fill="#F26D6D" opacity="0.25" />

    <!-- Freckles -->
    <circle cx="340" cy="540" r="4.5" fill="#B86B3E" opacity="0.7" />
    <circle cx="320" cy="565" r="4.5" fill="#B86B3E" opacity="0.7" />
    <circle cx="360" cy="570" r="4.5" fill="#B86B3E" opacity="0.7" />

    <circle cx="560" cy="540" r="4.5" fill="#B86B3E" opacity="0.7" />
    <circle cx="580" cy="565" r="4.5" fill="#B86B3E" opacity="0.7" />
    <circle cx="540" cy="570" r="4.5" fill="#B86B3E" opacity="0.7" />

    <!-- Eyes -->
    <ellipse cx="330" cy="400" rx="38" ry="55" fill="#21140F" transform="rotate(-8 330 400)" />
    <ellipse cx="570" cy="400" rx="38" ry="55" fill="#21140F" transform="rotate(8 570 400)" />

    <!-- Eye Catchlights -->
    <circle cx="315" cy="380" r="14" fill="#FFFFFF" />
    <circle cx="345" cy="425" r="6" fill="#FFFFFF" />
    <circle cx="555" cy="380" r="14" fill="#FFFFFF" />
    <circle cx="585" cy="425" r="6" fill="#FFFFFF" />

    <!-- Colorful Iris Accents -->
    <ellipse cx="335" cy="420" rx="15" ry="8" fill="#78C0E0" transform="rotate(-20 335 420)" opacity="0.85" />
    <ellipse cx="565" cy="420" rx="15" ry="8" fill="#78C0E0" transform="rotate(20 565 420)" opacity="0.85" />

    <!-- Eyebrows -->
    <path d="M 280 330 Q 320 280 360 290" fill="none" stroke="#3D261D" stroke-width="16" stroke-linecap="round" />
    <path d="M 620 330 Q 580 280 540 290" fill="none" stroke="#3D261D" stroke-width="16" stroke-linecap="round" />

    <!-- Tongue (Layered behind Mouth) -->
    <path d="M 415 555 C 415 640, 485 640, 485 555 Z" fill="#F47C7C" />
    <line x1="450" y1="555" x2="450" y2="615" stroke="#D95353" stroke-width="6" stroke-linecap="round" />

    <!-- Nose Base -->
    <path d="M 400 480 C 400 450, 500 450, 500 480 C 500 520, 470 540, 450 540 C 430 540, 400 520, 400 480 Z" fill="#3D261D" />
    <ellipse cx="430" cy="475" rx="14" ry="6" fill="#FFFFFF" opacity="0.5" transform="rotate(-15 430 475)" />

    <!-- Mouth -->
    <path d="M 450 540 C 450 580, 390 600, 360 560" fill="none" stroke="#3D261D" stroke-width="12" stroke-linecap="round" />
    <path d="M 450 540 C 450 580, 510 600, 540 560" fill="none" stroke="#3D261D" stroke-width="12" stroke-linecap="round" />
  </g>
</svg>